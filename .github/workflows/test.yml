name: Unity Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: EditMode Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-

      - name: Run EditMode Tests
        uses: game-ci/unity-test-runner@v4
        id: tests
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          unityVersion: 6000.5.1f1
          testMode: editmode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: EditMode Test Results

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results

      - name: Write Summary
        if: always()
        run: |
          XML="test-results/editmode-results.xml"
          echo "## Unity EditMode Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$XML" ]; then
            TOTAL=$(grep -o 'total="[0-9]*"'  "$XML" | grep -o '[0-9]*' | head -1)
            PASSED=$(grep -o 'passed="[0-9]*"' "$XML" | grep -o '[0-9]*' | head -1)
            FAILED=$(grep -o 'failed="[0-9]*"' "$XML" | grep -o '[0-9]*' | head -1)
            SKIPPED=$(grep -o 'skipped="[0-9]*"' "$XML" | grep -o '[0-9]*' | head -1)
            echo "| ✅ Passed | ❌ Failed | ⏭ Skipped | 📊 Total |" >> $GITHUB_STEP_SUMMARY
            echo "|---|---|---|---|"                                  >> $GITHUB_STEP_SUMMARY
            echo "| $PASSED | $FAILED | $SKIPPED | $TOTAL |"        >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ Test result XML not found — check runner logs." >> $GITHUB_STEP_SUMMARY
          fi
